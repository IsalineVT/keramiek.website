backend:
  name: git-gateway
  branch: main

local_backend: true
media_folder: "keramiek-netlify-decap/assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "settings"
    label: "Website content"
    files:
      - file: "keramiek-netlify-decap/data/site.json"
        label: "Keramiek website"
        name: "site"
        format: "json"
        fields:
          - {label: "Website", name: "site", widget: "object", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Description", name: "description", widget: "text"}]}
          - {label: "Hero", name: "hero", widget: "object", fields: [{label: "Eyebrow", name: "eyebrow", widget: "string"}, {label: "Title HTML", name: "title", widget: "text"}, {label: "Description", name: "description", widget: "text"}, {label: "Image", name: "image", widget: "image", required: false}, {label: "Primary button", name: "primaryButton", widget: "string"}, {label: "Secondary button", name: "secondaryButton", widget: "string"}]}
          - {label: "Stats", name: "stats", widget: "list", fields: [{label: "Number", name: "number", widget: "string"}, {label: "Label", name: "label", widget: "string"}]}
          - {label: "About", name: "about", widget: "object", fields: [{label: "Tag", name: "tag", widget: "string", required: false}, {label: "Title", name: "title", widget: "string"}, {label: "Text 1 HTML", name: "text1", widget: "text"}, {label: "Text 2", name: "text2", widget: "text"}, {label: "Image", name: "image", widget: "image", required: false}, {label: "Badge", name: "badge", widget: "string"}, {label: "Info boxes", name: "boxes", widget: "list", fields: [{label: "Label", name: "label", widget: "string"}, {label: "Value HTML", name: "value", widget: "text"}]}, {label: "Activities HTML", name: "activities", widget: "list", field: {label: "Activity", name: "activity", widget: "text"}}]}
          - {label: "Quote", name: "quote", widget: "object", fields: [{label: "Text", name: "text", widget: "text"}, {label: "Citation", name: "cite", widget: "string"}]}
          - {label: "Feature 1", name: "feature1", widget: "object", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Text", name: "text", widget: "text"}, {label: "Image", name: "image", widget: "image", required: false}, {label: "Button", name: "button", widget: "string"}]}
          - {label: "Feature 2", name: "feature2", widget: "object", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Text", name: "text", widget: "text"}, {label: "Image", name: "image", widget: "image", required: false}, {label: "Button", name: "button", widget: "string"}]}
          - {label: "News title", name: "newsTitle", widget: "string"}
          - {label: "News", name: "news", widget: "list", fields: [{label: "Tag", name: "tag", widget: "string"}, {label: "Title", name: "title", widget: "string"}, {label: "Text", name: "text", widget: "text"}, {label: "Image", name: "image", widget: "image", required: false}]}
          - {label: "Video", name: "video", widget: "object", fields: [{label: "Title", name: "title", widget: "string"}, {label: "Text", name: "text", widget: "text"}, {label: "YouTube embed URL", name: "youtube", widget: "string"}]}
          - {label: "Gallery intro", name: "galleryIntro", widget: "text"}
          - {label: "Gallery", name: "gallery", widget: "list", fields: [{label: "Category", name: "category", widget: "select", options: ["optreden", "repetitie", "activiteit"]}, {label: "Label", name: "label", widget: "string"}, {label: "Image", name: "image", widget: "image"}]}
          - {label: "Agenda intro", name: "agendaIntro", widget: "text"}
          - {label: "Agenda", name: "agenda", widget: "list", fields: [{label: "Day", name: "day", widget: "string"}, {label: "Month", name: "month", widget: "string"}, {label: "Title", name: "title", widget: "string"}, {label: "Text", name: "text", widget: "text"}, {label: "Badge", name: "badge", widget: "string"}, {label: "Badge class", name: "badgeClass", widget: "select", options: ["b-rep", "b-act", "b-new"], default: "b-act"}]}
          - {label: "Fixed repetition HTML", name: "fixedRepetition", widget: "text"}
          - {label: "Board intro", name: "boardIntro", widget: "text"}
          - {label: "Board", name: "board", widget: "list", fields: [{label: "Initials", name: "initials", widget: "string"}, {label: "Name", name: "name", widget: "string"}, {label: "Role", name: "role", widget: "string"}, {label: "Bio", name: "bio", widget: "text"}]}
          - {label: "Members intro", name: "membersIntro", widget: "text"}
          - {label: "Members", name: "members", widget: "list", fields: [{label: "Initials", name: "initials", widget: "string"}, {label: "Name", name: "name", widget: "string"}, {label: "Voice key", name: "voice", widget: "select", options: ["sopraan", "alt", "tenor", "bas"]}, {label: "Voice label", name: "voiceLabel", widget: "string"}]}
          - {label: "Contact", name: "contact", widget: "object", fields: [{label: "Intro", name: "intro", widget: "text"}, {label: "Address HTML", name: "address", widget: "text"}, {label: "Email", name: "email", widget: "string"}, {label: "Repetitions", name: "repetitions", widget: "string"}, {label: "Age", name: "age", widget: "string"}]}
          - {label: "Footer", name: "footer", widget: "string"}
