<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bedankt | Keramiek</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-dark:#922B21;--red-pale:#FEF0EE;--dark:#1a1a1a;--gray:#666;--border:#e8e0dc;--white:#fff}
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:Inter,sans-serif;background:linear-gradient(180deg,#fff 0%,#fff8f6 55%,#fff 100%);color:var(--dark);padding:2rem}
.card{max-width:620px;background:var(--white);border:1px solid var(--border);border-radius:16px;padding:3rem;box-shadow:0 18px 60px rgba(192,57,43,.12);text-align:center}
.tag{display:inline-block;background:var(--red-pale);color:var(--red);padding:6px 16px;border-radius:30px;font-size:.7rem;letter-spacing:2px;text-transform:uppercase;font-weight:700;margin-bottom:1.2rem}
h1{font-family:Syne,sans-serif;font-size:clamp(2rem,6vw,3.2rem);line-height:1.05;margin-bottom:1rem}
p{color:var(--gray);line-height:1.8;margin-bottom:2rem}
a{display:inline-flex;background:var(--red);color:#fff;text-decoration:none;padding:13px 24px;border-radius:4px;font-family:Syne,sans-serif;font-size:.8rem;font-weight:700;letter-spacing:1.4px;text-transform:uppercase}
a:hover{background:var(--red-dark)}
</style>
</head>
<body>
  <div class="card">
    <span class="tag">Bericht verzonden</span>
    <h1>Bedankt!</h1>
    <p>Je bericht werd goed doorgestuurd naar Jeugdkoor Keramiek. We nemen zo snel mogelijk contact op.</p>
    <a href="/">Terug naar de website</a>
  </div>
</body>
</html>
